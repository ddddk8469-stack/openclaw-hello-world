<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World OpenClaw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }
        .claw-emoji {
            font-size: 5rem;
            margin: 1rem 0;
            animation: bounce 1s ease infinite;
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #e94560;
        }
        footer {
            position: absolute;
            bottom: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(233, 69, 96, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(233, 69, 96, 0.8)); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="claw-emoji">🦞</div>
        <h1>Hello World</h1>
        <p class="subtitle">OpenClaw</p>
        <span class="badge">AI Agent Powered</span>
    </div>
    <footer>Generated by OpenClaw · 2026</footer>
</body>
</html>
